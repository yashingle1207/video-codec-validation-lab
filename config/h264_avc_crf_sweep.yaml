# File: h264_avc_crf_sweep.yaml
# Purpose: Configure H.264/AVC CRF sweep validation points.
#
# H.264 CRF sweep configuration
# Encodes a single input YUV at multiple CRF values to generate RD data.

codec: libx264
mode: crf
preset: medium
gop: 30
fps: 30.0

crf_values: [18, 23, 28, 33, 38, 45]

input:
  width: 352
  height: 288
  # Path resolved at runtime via CLI or run_validation_pipeline.sh
  yuv: data/raw_yuv/test_352x288_30fps_150f.yuv
  frames: 150

output:
  dir: outputs/encoded/h264_crf_sweep
  report: outputs/reports/h264_crf_sweep_results.json
